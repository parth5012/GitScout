services:
  # ─────────────────────────────────────────
  # Celery Worker
  # ─────────────────────────────────────────
  - type: worker
    name: gitscout-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    startCommand: celery -A beat worker --loglevel=info
    envVars:
      - key: CELERY_BROKER_URL
        sync: false   # Will be set manually in Render dashboard
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DISCORD_WEBHOOK
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LLM_PROVIDER
        value: "google"
      - key: PYTHONPATH
        value: "/usr/src/app"

  # ─────────────────────────────────────────
  # Celery Beat Scheduler
  # ─────────────────────────────────────────
  - type: worker
    name: gitscout-beat
    runtime: docker
    dockerfilePath: ./Dockerfile
    startCommand: celery -A beat beat --loglevel=info
    envVars:
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DISCORD_WEBHOOK
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LLM_PROVIDER
        value: "google"
      - key: PYTHONPATH
        value: "/usr/src/app"
